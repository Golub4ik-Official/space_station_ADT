# Syndicate cyborgs
- type: entity
  parent: BorgBase
  id: BorgSyndicate
  name: syndicate assault cyborg
  description: A deadly cyborg under syndicate control.
  components:
  - type: BorgModule
    moduleType: Syndicate
  - type: BorgLaw
    lawSet: SyndicateOverride
    isSyndicateOverride: true
  - type: BorgAI
    lawSyncEnabled: false
  - type: BorgUpgrade
    weaponsUnlocked: true
  - type: BorgVisualizer
    moduleSprite: "Silicon/Borgs/Sprites/borg_syndicate.rsi"

