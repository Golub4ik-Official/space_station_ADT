# Base cyborg entity prototype
- type: entity
  id: BorgBase
  name: cyborg
  description: A lawed cyborg, servant of the crew.
  components:
  - type: Borg
  - type: BorgSlots
    slotCount: 3
  - type: BorgBattery
  - type: BorgWires
  - type: BorgComponentParts
  - type: BorgLaw
    lawSet: Crewsimov
  - type: BorgAI
  - type: BorgUpgrade
  - type: BorgVisualizer
  - type: Sprite
    sprite: "Silicon/Borgs/Sprites/borg_standard.rsi"
  - type: Physics
    bodyType: Kinematic
  - type: Interaction
  - type: Radio
  - type: PDA
  - type: Camera
  - type: HealthBar
  - type: StaminaBar

# Engineering cyborg
- type: entity
  parent: BorgBase
  id: BorgEngineering
  name: engineering cyborg
  components:
  - type: BorgModule
    moduleType: Engineering
  - type: BorgVisualizer
    moduleSprite: "Silicon/Borgs/Sprites/borg_engineering.rsi"
  - type: BorgEnergyStorage
    storages:
    - name: Metal
      maxAmount: 50
      rechargeRate: 1
    - name: Glass
      maxAmount: 50
      rechargeRate: 1

