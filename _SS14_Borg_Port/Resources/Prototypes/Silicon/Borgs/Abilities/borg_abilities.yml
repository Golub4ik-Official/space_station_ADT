    icon: "Silicon/Borgs/HUD/hud_robot.rsi/laws.png"

- type: entity
  id: BorgAbilitySensorMode
  name: sensor mode
  description: Cycle through sensor modes.
  components:
  - type: BorgAbility
    abilityType: SensorMode
    icon: "Silicon/Borgs/HUD/hud_robot.rsi/sensor.png"

- type: entity
  id: BorgAbilityRadio
  name: radio
