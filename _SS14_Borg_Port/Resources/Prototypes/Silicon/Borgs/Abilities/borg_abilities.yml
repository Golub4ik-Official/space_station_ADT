# Borg ability prototypes
- type: entity
  id: BorgAbilityHeadlamp
  name: headlamp
  description: Toggle your integrated headlamp.
  components:
  - type: BorgAbility
    abilityType: Headlamp
    icon: "Silicon/Borgs/HUD/hud_robot.rsi/headlamp_off.png"
    toggleIcon: "Silicon/Borgs/HUD/hud_robot.rsi/headlamp_on.png"

- type: entity
  id: BorgAbilityThrusters
  name: ion thrusters
  description: Toggle ion thrusters for space movement.
  components:
  - type: BorgAbility
    abilityType: Thrusters
    icon: "Silicon/Borgs/HUD/hud_robot.rsi/thrusters_off.png"
    toggleIcon: "Silicon/Borgs/HUD/hud_robot.rsi/thrusters_on.png"

- type: entity
  id: BorgAbilitySelfDiagnosis
  name: self-diagnosis
  description: Run a diagnostic check on your systems.
  components:
  - type: BorgAbility
    abilityType: SelfDiagnosis
    icon: "Silicon/Borgs/HUD/hud_robot.rsi/diagnosis.png"

- type: entity
  id: BorgAbilityStateLaws
  name: state laws
  description: Announce your current laws over the radio.
  components:
  - type: BorgAbility
