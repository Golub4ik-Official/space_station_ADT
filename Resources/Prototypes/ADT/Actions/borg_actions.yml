- type: entity
  parent: BaseAction
  id: ActionBorgHeadlamp
  name: Headlamp
  description: Toggle your headlamp.
  categories: [ HideSpawnMenu ]
  components:
  - type: InstantAction
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_borg.rsi
      state: headlamp
    event: !type:BorgHeadlampToggleEvent

