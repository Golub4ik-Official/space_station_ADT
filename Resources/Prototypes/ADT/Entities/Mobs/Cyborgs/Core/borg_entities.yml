- type: entity
  id: ADTBorgEngineering
  name: engineering cyborg
  parent: ADTBorgBase
  components:
  - type: BorgSlot
    maxModules: 1
    moduleWhitelist:
    - ADTBorgModuleEngineering
    - ADTBorgModuleRPD
  - type: BorgSwitchableType
    selectedBorgType: engineering
  - type: BorgSwitchableSubtype
  - type: Sprite
    sprite: Mobs/Silicon/chassis.rsi
    layers:
    - state: engineer
    - state: engineer_e_r
      shader: unshaded
      visible: false
    - state: engineer_l
      shader: unshaded
      visible: false
  - type: Icon
    sprite: Mobs/Silicon/chassis.rsi
    state: engineer
  - type: Construction
    graph: Cyborg
    node: cyborg

