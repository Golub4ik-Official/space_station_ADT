# Bluespace body bag
- type: entity
  id: BodyBagBluespace
  parent: BodyBag
  name: bluespace body bag
  description: A bluespace body bag designed for the storage and transportation of cadavers. Can hold much more than a standard body bag. Slows bodily decomposition by two thirds.
  components:
  - type: Item
    size: Small
    heldPrefix: bag
  - type: Sprite
    sprite: Objects/Specific/Medical/Morgue/bodybags.rsi
    layers:
    - state: bluespace_bag
      map: ["unfoldedLayer", "enum.StorageVisualLayers.Base"]
    - state: bluespace_bag_folded
      map: ["foldedLayer"]
      visible: false
    - state: bluespace_bag_open
      map: ["enum.StorageVisualLayers.Door"]
    - state: paper
      map: ["enum.PaperLabelVisuals.Layer"]
  - type: Icon
    sprite: Objects/Specific/Medical/Morgue/bodybags.rsi
    state: bluespace_bag
  - type: Tag
    tags:
    - BodyBag
  - type: EntityStorage
    capacity: 15
    isCollidableWhenOpen: true
    airtight: false
    whitelist:
      tags:
        - VimPilot
        - CanPilot
    closeSound:
      path: /Audio/Misc/zip.ogg
    openSound:
      path: /Audio/Misc/zip.ogg
  - type: EntityStorageVisuals
    stateDoorOpen: bluespace_bag_open
  - type: PaperLabel
    labelSlot:
      insertVerbText: paper-label-attach
      ejectVerbText: paper-label-remove
      whitelist:
        components:
        - Paper
      blacklist:
        tags:
        - Book
  - type: Appearance
  - type: EntityStorageLayingDownOverride
  - type: GenericVisualizer
    visuals:
      enum.PaperLabelVisuals.HasLabel:
        enum.PaperLabelVisuals.Layer:
          True: {visible: true}
          False: {visible: false}
      enum.PaperLabelVisuals.LabelType:
        enum.PaperLabelVisuals.Layer:
          Paper: { state: paper }
          Bounty: { state: bounty }
          CaptainsPaper: { state: captains_paper }
          Invoice: { state: invoice }
      enum.FoldedVisuals.State:
        foldedLayer:
          True: {visible: true}
          False: {visible: false}
        unfoldedLayer:
          True: {visible: false}
          False: {visible: true}
  - type: Buckle
    dontCollide: true
  - type: Pullable
  - type: BluespaceBodyBag
  - type: Foldable
    canFoldInsideContainer: false

  - type: ContainerContainer
    containers:
      entity_storage: !type:Container
      paper_label: !type:ContainerSlot
 
- type: entity
  id: BodyBagBluespaceFolded
  parent: BodyBagBluespace
  suffix: folded
  components:
  - type: Foldable
    folded: true
    canFoldInsideContainer: false

