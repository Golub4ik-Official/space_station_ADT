# Stasis body bag
- type: entity
  id: BodyBagStasis
  parent: BodyBag
  name: stasis body bag
  description: A disposable bodybag designed to keep its contents in stasis, preventing decay and further injury. The bag itself cannot maintain stasis for long, and will eventually fall apart.
  components:
  - type: Item
    size: Normal
    heldPrefix: bag
  - type: Sprite
    sprite: Objects/Specific/Medical/Morgue/bodybags.rsi
    layers:
    - state: stasis_bag
      map: ["unfoldedLayer", "enum.StorageVisualLayers.Base"]
    - state: stasis_bag_folded
      map: ["foldedLayer"]
      visible: false
    - state: stasis_bag_open
      map: ["enum.StorageVisualLayers.Door"]
    - state: paper
      map: ["enum.PaperLabelVisuals.Layer"]
  - type: Icon
    sprite: Objects/Specific/Medical/Morgue/bodybags.rsi
    state: stasis_bag
  - type: Tag
    tags:
    - BodyBag
  - type: EntityStorage
    capacity: 1
    isCollidableWhenOpen: true
    whitelist:
      tags:
        - VimPilot
        - CanPilot
    closeSound:
      path: /Audio/Effects/spray.ogg
    openSound:
      path: /Audio/Effects/spray.ogg
  - type: EntityStorageVisuals
    stateDoorOpen: stasis_bag_open
  - type: PaperLabel
    labelSlot:
      insertVerbText: paper-label-attach
      ejectVerbText: paper-label-remove
      whitelist:
        components:
        - Paper
      blacklist:
        tags:
        - Book
  - type: Appearance
  - type: EntityStorageLayingDownOverride
  - type: GenericVisualizer
    visuals:
      enum.PaperLabelVisuals.HasLabel:
        enum.PaperLabelVisuals.Layer:
          True: {visible: true}
          False: {visible: false}
      enum.PaperLabelVisuals.LabelType:
        enum.PaperLabelVisuals.Layer:
          Paper: { state: paper }
          Bounty: { state: bounty }
          CaptainsPaper: { state: captains_paper }
          Invoice: { state: invoice }
      enum.FoldedVisuals.State:
        foldedLayer:
          True: {visible: true}
          False: {visible: false}
        unfoldedLayer:
          True: {visible: false}
          False: {visible: true}
  - type: Buckle
    dontCollide: true
  - type: Pullable
  - type: StasisBodyBag

  - type: AntiRottingContainer
  - type: ContainerContainer
    containers:
      entity_storage: !type:Container
      paper_label: !type:ContainerSlot
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 40
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetPlastic1:
            min: 1
            max: 1
  - type: StaticPrice
    price: 200

- type: entity
  id: BodyBagStasisFolded
  parent: BodyBagStasis
  suffix: folded
  components:
  - type: Foldable
    folded: true

