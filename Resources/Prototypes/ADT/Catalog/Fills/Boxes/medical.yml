- type: entity
  name: box of small syringes
  parent: BoxCardboard
  id: ADTSmallSyringeBox
  description: It's plastic a box with small syringes inside.
  components:
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,2,1
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ADTSmallSyringe
          amount: 6
  - type: Sprite
    sprite: ADT/Objects/Specific/Chemistry/syringe.rsi
    state: icon
  - type: Item
    sprite: ADT/Objects/Specific/Chemistry/syringe.rsi
    size: Normal
  - type: PhysicalComposition
    materialComposition:
      Cardboard: 50

# Body bag boxes
- type: entity
  name: bluespace body bag box
  parent: BoxCardboard
  id: BoxBodyBagBluespace
  description: Contains bluespace body bags.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: BodyBagBluespaceFolded
        amount: 4
  - type: Sprite
    layers:
      - state: box_medical
      - state: bodybags
  - type: Storage
    whitelist:
      tags:
        - BodyBag

