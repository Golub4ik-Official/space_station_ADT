- type: entity
  id: ADTBorgModuleEngineering
  name: Engineering Module
  components:
  - type: ADTBorgModule
    moduleType: Engineering
    items:
    - Welder
    - Wrench
    - Crowbar
    - Screwdriver
    energyStorages:
    - name: Metal
      maxAmount: 50
      rechargeRate: 1
    - name: Glass
      maxAmount: 50
      rechargeRate: 1
    radioChannels:
    - Engineering
    innateActions: []
    armor:
      brute: 30
      burn: 30
    languages:
    - GalacticCommon

